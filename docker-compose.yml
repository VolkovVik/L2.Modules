services:
  aspu.api:
    image: ${DOCKER_REGISTRY-}aspuapi
    container_name: aspu.api
    build:
      context: .
      dockerfile: source/API/Aspu.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    depends_on:
      - mosquitto
      - nats
      - postgres

  aspu.gateway:
    image: ${DOCKER_REGISTRY-}aspugateway
    container_name: aspu.gateway
    build:
      context: .
      dockerfile: source/API/Aspu.Gateway/Dockerfile
    ports:
      - 3000:8080
      - 3001:8081
    depends_on:
      - aspu.api

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    ports:
      - 1883:1883
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  nats:
    image: nats:latest
    container_name: nats
    ports:
      - 4222:4222
      - 8222:8222

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: aspu
      POSTGRES_USER: aspu
      POSTGRES_PASSWORD: aspu
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
