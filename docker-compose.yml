services:
  aspu.api:
    image: ${DOCKER_REGISTRY-}aspuapi
    container_name: Aspu.Api
    build:
      context: .
      dockerfile: source/API/Aspu.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
